name: SPDX 3.0 Report Generation

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SCANNER_IMAGE: ghcr.io/${{ github.repository_owner }}/fossology-spdx3:latest

jobs:
  spdx3_generation:
    runs-on: ubuntu-latest
    name: Generate SPDX 3.0 Report
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull scanner image
        run: docker pull ${{ env.SCANNER_IMAGE }}

      - name: Run SPDX 3.0 scan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/opt/repo" \
            -e GITHUB_REPOSITORY="${{ github.repository }}" \
            -e GITHUB_REPOSITORY_OWNER="${{ github.repository_owner }}" \
            ${{ env.SCANNER_IMAGE }} \
            copyright \
            --scan-dir /opt/repo \
            --output /opt/repo/results/spdx3_report.jsonld

      - name: Fix result permissions
        if: always()
        run: sudo chmod -R a+rw results/ 2>/dev/null || true

      - name: Upload SPDX 3.0 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spdx3-report
          path: results/
