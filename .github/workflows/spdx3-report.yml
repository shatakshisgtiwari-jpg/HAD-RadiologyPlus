name: SPDX 3.0 Report Generation

on:
  # Always runs after the build workflow (which runs on every push to main)
  workflow_run:
    workflows: ["Build & Push Scanner Image"]
    types: [completed]
  workflow_dispatch:

jobs:
  spdx3_generation:
    runs-on: ubuntu-latest
    name: Generate SPDX 3.0 Report
    # Skip if triggered by a failed build workflow
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run SPDX 3.0 scan
        uses: ./docker/fossology-spdx3
        with:
          scanners: copyright
          output: results/spdx3_report.jsonld

      - name: Fix result permissions
        if: always()
        run: sudo chmod -R a+rw results/ 2>/dev/null || true

      - name: Upload SPDX 3.0 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spdx3-report
          path: results/
