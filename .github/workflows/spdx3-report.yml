name: SPDX 3.0 Report Generation

on:
  # Always runs after the build workflow (which runs on every push to main)
  workflow_run:
    workflows: ["Build & Push Scanner Image"]
    types: [completed]
  workflow_dispatch:

jobs:
  spdx3_generation:
    runs-on: ubuntu-latest
    name: Generate SPDX 3.0 Report
    # Skip if triggered by a failed build workflow
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 1: Run the official FOSSology scan (produces results/ with TEXT report)
      # TODO: Replace with your fork once SPDX 3.0 is integrated there:
      #   uses: shatakshisgtiwari-jpg/fossology-action@main
      - name: Run FOSSology scan
        uses: fossology/fossology-action@v1
        with:
          scan_mode: 'repo'
          scanners: 'nomos ojo copyright keyword'
          report_format: 'TEXT'

      # Step 2: Generate SPDX 3.0 report from scan results
      - name: Generate SPDX 3.0 report
        uses: ./docker/fossology-spdx3

      - name: Fix result permissions
        if: always()
        run: sudo chmod -R a+rw results/ 2>/dev/null || true

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fossology-scan-results
          path: results/
