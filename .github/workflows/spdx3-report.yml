name: SPDX 3.0 Report (Manual)

on:
  workflow_dispatch:

jobs:
  scan-and-report:
    runs-on: ubuntu-latest
    name: FOSSology Scan + SPDX 3.0 Report
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Pulls custom image → scans in repo mode → generates SPDX 3.0 JSON-LD
      - name: Run FOSSology scan + SPDX 3.0 report
        uses: shatakshisgtiwari-jpg/fossology-action@main
        with:
          scan_mode: 'repo'
          scanners: 'copyright'
          report_format: 'TEXT'
          allowlist_file_path: 'allowlist.json'

      - name: Fix result permissions
        if: always()
        run: sudo chmod -R a+rw results/ 2>/dev/null || true

      - name: Upload SPDX 3.0 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spdx3-report
          path: results/
