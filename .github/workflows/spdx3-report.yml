name: SPDX 3.0 Report Generation

on:
  push:
    branches: [main]
    paths-ignore:
      - 'scripts/spdx3_builder.py'
      - 'docker/fossology-spdx3/**'
  workflow_run:
    workflows: ["Build & Push FOSSology SPDX 3.0 Scanner Image"]
    types: [completed]
  workflow_dispatch:

jobs:
  spdx3_generation:
    runs-on: ubuntu-latest
    name: Generate SPDX 3.0 Report
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull scanner image
        run: docker pull ghcr.io/${{ github.repository_owner }}/fossology-spdx3:latest

      - name: Run SPDX 3.0 scan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/opt/repo" \
            -e GITHUB_REPOSITORY="${{ github.repository }}" \
            ghcr.io/${{ github.repository_owner }}/fossology-spdx3:latest \
            copyright \
            --output results/spdx3_report.jsonld

      - name: Upload SPDX 3.0 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spdx3-report
          path: results/
