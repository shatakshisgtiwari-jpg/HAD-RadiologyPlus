name: SPDX 3.0 Report Generation

on:
  push:
    branches:
      - main
  workflow_run:
    workflows: ["Build & Push FOSSology SPDX 3.0 Scanner Image"]
    types: [completed]

jobs:
  spdx3_generation:
    runs-on: ubuntu-latest
    name: Generate SPDX 3.0 Report
    # Skip if triggered by a failed build workflow
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull scanner image
        run: docker pull ghcr.io/${{ github.repository_owner }}/fossology-spdx3:latest

      - name: Run SPDX 3.0 scan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/opt/repo" \
            -e GITHUB_REPOSITORY="${{ github.repository }}" \
            ghcr.io/${{ github.repository_owner }}/fossology-spdx3:latest \
            copyright \
            --output results/spdx3_report.jsonld

      - name: Upload SPDX 3.0 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spdx3-report
          path: results/
