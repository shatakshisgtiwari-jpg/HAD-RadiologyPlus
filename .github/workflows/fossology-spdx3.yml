name: FOSSology SPDX 3.0 Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: fossology-spdx3

jobs:
  # ── Job 1: Build & push image (skips if Docker files unchanged) ──
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if image files changed
        id: changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^docker/fossology-spdx3/'; then
            echo "image_changed=true" >> $GITHUB_OUTPUT
          else
            echo "image_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GHCR
        if: steps.changes.outputs.image_changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: steps.changes.outputs.image_changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: docker/fossology-spdx3
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest

      - name: Skip build (no image changes)
        if: steps.changes.outputs.image_changed == 'false'
        run: echo "No changes to docker/fossology-spdx3/ — skipping image build"

  # ── Job 2: Generate SPDX 3.0 report (always waits for build) ──
  spdx3-report:
    runs-on: ubuntu-latest
    needs: build-and-push
    name: Generate SPDX 3.0 Report
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull scanner image
        run: docker pull ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest

      - name: Run SPDX 3.0 scan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/opt/repo" \
            -e GITHUB_REPOSITORY="${{ github.repository }}" \
            -e GITHUB_REPOSITORY_OWNER="${{ github.repository_owner }}" \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest \
            copyright \
            --scan-dir /opt/repo \
            --output /opt/repo/results/spdx3_report.jsonld

      - name: Fix result permissions
        if: always()
        run: sudo chmod -R a+rw results/ 2>/dev/null || true

      - name: Upload SPDX 3.0 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spdx3-report
          path: results/
