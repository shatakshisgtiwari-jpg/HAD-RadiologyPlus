name: FOSSology SPDX 3.0 Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: fossology-spdx3

jobs:
  # ── Job 1: Build & push custom scanner image (skips if unchanged) ──
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if image files changed
        id: changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^docker/fossology-spdx3/'; then
            echo "image_changed=true" >> $GITHUB_OUTPUT
          else
            echo "image_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GHCR
        if: steps.changes.outputs.image_changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: steps.changes.outputs.image_changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: docker/fossology-spdx3
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest

      - name: Skip build (no image changes)
        if: steps.changes.outputs.image_changed == 'false'
        run: echo "No changes to docker/fossology-spdx3/ — skipping image build"

  # ── Job 2: Scan repo → Generate SPDX 3.0 report → Archive ──
  scan-and-report:
    runs-on: ubuntu-latest
    needs: build-image
    name: FOSSology Scan + SPDX 3.0 Report
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Pulls custom image → scans in repo mode → generates SPDX 3.0 JSON-LD
      - name: Run FOSSology scan + SPDX 3.0 report
        uses: shatakshisgtiwari-jpg/fossology-action@main
        with:
          scan_mode: 'repo'
          scanners: 'copyright'
          report_format: 'SPDX3_JSON'
          allowlist_file_path: 'allowlist.json'

      - name: Fix result permissions
        if: always()
        run: sudo chmod -R a+rw results/ 2>/dev/null || true

      - name: Upload SPDX 3.0 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spdx3-report
          path: results/
