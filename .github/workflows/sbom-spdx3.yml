name: SPDX 3.0 SBOM Generation

on:
  push:
    branches:
      - main

jobs:
  sbom_generation:
    runs-on: ubuntu-latest
    name: Generate SPDX 3.0 SBOM
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 1: FOSSology copyright scan ──
      # TEXT format produces copyrights.txt directly from the copyright
      # agent — no SPDX 2.3 intermediate. The builder parses this
      # and produces SPDX 3.0 directly.
      - name: FOSSology copyright scan
        continue-on-error: true
        uses: fossology/fossology-action@v1
        with:
          scan_mode: 'repo'
          scanners: 'copyright'
          report_format: 'TEXT'

      - name: Fix result permissions
        if: always()
        run: sudo chmod -R a+rw results/ 2>/dev/null || true

      # ── Step 2: Build SPDX 3.0 directly ──
      # spdx3_builder.py collects data from:
      #   1. FOSSology findings (per-file copyright)
      #   2. Built-in manifest parsers (npm, Maven)
      #   3. Filesystem walk (SHA-256, MIME type for every file)
      # Builds SPDX 3.0 elements directly.
      - name: Set up Python
        if: always()
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate SPDX 3.0 SBOM (plain)
        if: always()
        run: |
          python scripts/spdx3_builder.py \
            --repo-root . \
            --fossology-report results/ \
            --output results/sbom_spdx3.jsonld

      - name: Generate SPDX 3.0 SBOM (with clearing decisions)
        if: always()
        run: |
          python scripts/spdx3_builder.py \
            --repo-root . \
            --fossology-report results/ \
            --output results/sbom_spdx3_cleared.jsonld \
            --clearing-policy clearing-policy.json

      - name: Display clearing report
        if: always()
        run: |
          if [ -f results/sbom_spdx3_cleared_clearing_report.txt ]; then
            echo "=== License Clearing Report ==="
            cat results/sbom_spdx3_cleared_clearing_report.txt
          else
            echo "No clearing report generated"
          fi

      - name: Upload SBOM artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-reports
          path: results/
