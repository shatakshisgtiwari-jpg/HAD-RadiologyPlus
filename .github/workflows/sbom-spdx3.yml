name: SPDX 3.0 SBOM Generation

on:
  push:
    branches:
      - main

jobs:
  sbom_generation:
    runs-on: ubuntu-latest
    name: Generate SPDX 3.0 SBOM
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 1: FOSSology deep license & copyright scan ──
      # SPDX_JSON format provides structured per-file findings with
      # checksums, licenseConcluded, and copyrightText.
      # Falls back to TEXT if SPDX_JSON is malformed (SpdxReport.py bug).
      - name: FOSSology license & copyright scan
        continue-on-error: true
        uses: fossology/fossology-action@v1
        with:
          scan_mode: 'repo'
          scanners: 'nomos ojo copyright keyword'
          report_format: 'SPDX_JSON'

      - name: Fix result permissions
        if: always()
        run: sudo chmod -R a+rw results/ 2>/dev/null || true

      # ── Step 1.5: Install npm dependencies for license metadata ──
      # npm lockfiles often omit license fields. Running 'npm ci' creates
      # node_modules/ so the builder can read license from each package's
      # own package.json. This is generic — auto-detects all lockfiles.
      - name: Install npm dependencies (for license enrichment)
        if: always()
        run: |
          for lockfile in $(find . -name "package-lock.json" \
            -not -path "*/node_modules/*" -not -path "*/.git/*"); do
            dir=$(dirname "$lockfile")
            echo "Installing npm deps in $dir ..."
            (cd "$dir" && npm ci --ignore-scripts --no-audit --no-fund) || \
            echo "  [!] npm ci failed in $dir (non-fatal)"
            # Verify node_modules was created
            if [ -d "$dir/node_modules" ]; then
              count=$(ls "$dir/node_modules" | wc -l)
              echo "  node_modules created: $count entries"
            else
              echo "  [!] node_modules NOT created in $dir"
            fi
          done

      # ── Step 2: Generic dependency extraction via Syft ──
      # Syft auto-detects all ecosystem lockfiles (npm, Maven, pip, Go,
      # Cargo, Composer, NuGet, Gems, etc.) and outputs a unified JSON
      # with PURLs, versions, and licenses. This makes the pipeline
      # project-agnostic without writing per-ecosystem parsers.
      - name: Install Syft
        if: always()
        uses: anchore/sbom-action/download-syft@v0
        id: syft

      - name: Run Syft dependency scan
        if: always()
        run: |
          mkdir -p results
          syft dir:. -o syft-json=results/syft_deps.json 2>/dev/null || \
            echo "[!] Syft scan failed (non-fatal, built-in parsers will be used)"

      # ── Step 3: Build SPDX 3.0 directly (no conversion) ──
      # spdx3_builder.py collects data from four sources:
      #   1. FOSSology findings (per-file license + copyright)
      #   2. Syft JSON (generic multi-ecosystem dependency data)
      #   3. Lock file parsing (npm, Maven — fallback if no Syft)
      #   4. Filesystem walk (SHA-256, MIME type for every file)
      # Then builds SPDX 3.0 elements directly — no SPDX 2.3 intermediate.
      - name: Set up Python
        if: always()
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate SPDX 3.0 SBOM (plain)
        if: always()
        run: |
          python scripts/spdx3_builder.py \
            --repo-root . \
            --fossology-report results/ \
            --syft-json results/syft_deps.json \
            --output results/sbom_spdx3.jsonld

      - name: Generate SPDX 3.0 SBOM (with clearing decisions)
        if: always()
        run: |
          python scripts/spdx3_builder.py \
            --repo-root . \
            --fossology-report results/ \
            --syft-json results/syft_deps.json \
            --output results/sbom_spdx3_cleared.jsonld \
            --clearing-policy clearing-policy.json

      - name: Display clearing report
        if: always()
        run: |
          if [ -f results/sbom_spdx3_cleared_clearing_report.txt ]; then
            echo "=== License Clearing Report ==="
            cat results/sbom_spdx3_cleared_clearing_report.txt
          else
            echo "No clearing report generated"
          fi

      - name: Upload SBOM artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-reports
          path: results/
