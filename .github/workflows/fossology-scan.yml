name: FOSSology License Scan

on:
  push:
    branches:
      - main

jobs:
  license_scan:
    runs-on: ubuntu-latest
    name: Run FOSSology scan
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: FOSSology compliance scan
        # continue-on-error required: FOSSology scanner has a known bug where
        # SpdxReport.py crashes with 'NoneType & LicenseSymbol' TypeError when
        # package.license_concluded is None during SPDX report finalization.
        # Downstream steps check for results/sbom_spdx.json before proceeding.
        continue-on-error: true
        uses: fossology/fossology-action@v1
        with:
          scan_mode: 'repo'
          scanners: 'nomos ojo copyright keyword'
          report_format: 'SPDX_JSON'
          allowlist_file_path: 'allowlist.json'

      - name: Set up Python
        if: always()
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Convert SPDX 2.3 to SPDX 3.0 (custom script)
        if: always()
        run: |
          if [ -f results/sbom_spdx.json ]; then
            echo "Converting SPDX 2.3 to SPDX 3.0 (custom + clearing decisions)..."
            sudo chmod -R a+rw results/
            python scripts/spdx_conv.py results/sbom_spdx.json results/sbom_spdx3_custom.jsonld allowlist.json
          else
            echo "::warning::No SPDX 2.3 report found at results/sbom_spdx.json"
          fi

      - name: Install spdx-tools
        if: always()
        run: pip install spdx-tools==0.8.5

      - name: Convert SPDX 2.3 to SPDX 3.0 (spdx-tools official)
        if: always()
        run: |
          if [ -f results/sbom_spdx.json ]; then
            echo "Converting SPDX 2.3 to SPDX 3.0 (spdx-tools)..."
            python scripts/spdx_conv_official.py results/sbom_spdx.json results/sbom_spdx3_official.jsonld
          else
            echo "::warning::No SPDX 2.3 report found at results/sbom_spdx.json"
          fi

      - name: Compare SPDX 3.0 outputs
        if: always()
        run: |
          if [ -f results/sbom_spdx3_custom.jsonld ] && [ -f results/sbom_spdx3_official.jsonld ]; then
            python scripts/compare_converters.py results/sbom_spdx3_custom.jsonld results/sbom_spdx3_official.jsonld
          else
            echo "::warning::One or both SPDX 3.0 files missing, cannot compare"
          fi

      - name: Display clearing report
        if: always()
        run: |
          if [ -f results/sbom_spdx3_custom_clearing_report.txt ]; then
            echo "=== License Clearing Report ==="
            cat results/sbom_spdx3_custom_clearing_report.txt
          else
            echo "No clearing report generated (allowlist may not have been provided)"
          fi

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fossology-report
          path: results/