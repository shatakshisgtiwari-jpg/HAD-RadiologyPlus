# ──────────────────────────────────────────────────────────────
# This is a lightweight SPDX 3.0 post-processing action.
# For the full FOSSology scan, use a fork of fossology/fossology-action
# that integrates this builder into its pipeline.
# ──────────────────────────────────────────────────────────────

name: 'SPDX 3.0 Report Builder'
description: 'Convert FOSSology scan results into an SPDX 3.0 JSON-LD report'
branding:
  icon: 'shield'
  color: 'green'

inputs:
  scan-dir:
    description: 'Directory that was scanned (repo root)'
    required: false
    default: '/github/workspace'
  output:
    description: 'Output path for SPDX 3.0 JSON-LD (relative to workspace)'
    required: false
    default: 'results/spdx3_report.jsonld'

outputs:
  report-path:
    description: 'Path to the generated SPDX 3.0 report'

runs:
  using: 'docker'
  image: 'Dockerfile'
  args:
    - 'copyright'
    - '--scan-dir'
    - ${{ inputs.scan-dir }}
    - '--output'
    - '/github/workspace/${{ inputs.output }}'
